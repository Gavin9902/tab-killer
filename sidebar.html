<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Killer</title>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div id="container">
    <div id="tabInfo">
      <img id="favicon" src="" alt="" width="16" height="16" />
      <span id="title">加载中...</span>
    </div>
    <textarea id="noteInput" placeholder="打开这个页面，我想..." rows="2" maxlength="200"></textarea>
    <div id="actions">
      <button id="saveBtn">记下目的</button>
    </div>
    <div id="feedback"></div>
    <button id="portalLink">
      <span class="portal-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="7" height="7"></rect>
        </svg>
      </span>
      <span class="portal-text">
        <span class="portal-label">浏览归档页面</span>
        <span class="portal-shortcut">⌘T</span>
      </span>
    </button>
  </div>
  <script src="sidebar.js"></script>
</body>
</html>
