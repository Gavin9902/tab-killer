<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Killer — 我的传送门</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1 id="logo">Tab Killer</h1>
      <div id="headerRight">
        <div id="viewToggle">
          <button class="view-btn active" data-view="tile">站点</button>
          <button class="view-btn" data-view="list">列表</button>
        </div>
        <span id="tabCount"></span>
        <button id="settingsBtn" title="设置">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
          </svg>
        </button>
      </div>
    </header>

    <section id="recentScroll" class="hidden">
      <div id="recentTrack"></div>
    </section>

    <section id="searchBar">
      <div id="searchWrapper">
        <svg id="searchIcon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="searchInput" type="text" placeholder="描述你印象中的那个页面..." autocomplete="off" />
        <button id="clearSearch" class="hidden" title="清除搜索">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
    </section>

    <nav id="filters">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="today">今天</button>
      <button class="filter-btn" data-filter="yesterday">昨天</button>
      <button class="filter-btn" data-filter="week">本周</button>
      <button class="filter-btn" data-filter="older">更早</button>
    </nav>

    <main id="results">
      <div id="cardGrid"></div>
      <div id="noResults" class="state-message hidden">
        <div class="state-icon">--</div>
        <p class="state-title">没找到匹配的页面</p>
        <p class="state-desc">试试换一个描述方式，或者</p>
        <a id="googleLink" href="#" target="_blank" rel="noopener">在 Google 搜索</a>
      </div>
      <div id="emptyState" class="state-message hidden">
        <div class="state-icon">--</div>
        <p class="state-title">还没有归档的标签页</p>
        <p class="state-desc">Tab Killer 正在后台运行。当你不活跃一段时间后，标签页会自动归档到这里。<br>你也可以现在就去工具栏弹窗里，随手记下某个页面的目的。</p>
      </div>
    </main>

    <!-- 设置面板 -->
    <div id="settingsOverlay" class="hidden"></div>
    <div id="settingsPanel" class="hidden">
      <div id="settingsHeader">
        <span>设置</span>
        <button id="settingsClose">×</button>
      </div>
      <div id="settingsBody">
        <label class="setting-row">
          <span class="setting-label">不活跃多久后卸掉（分钟）</span>
          <input type="number" id="settingDiscard" min="1" max="1440" class="setting-input" />
        </label>
        <label class="setting-row">
          <span class="setting-label">不活跃多久后归档关闭（分钟）</span>
          <input type="number" id="settingArchive" min="1" max="43200" class="setting-input" />
        </label>
        <div id="settingsHint">修改后立即生效</div>
      </div>
    </div>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
